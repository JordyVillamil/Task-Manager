<!-- TOOLBAR: Barra superior con el título y botón de nueva tarea -->
<mat-toolbar color="primary">
  <span>Task Manager</span>

  <!-- spacer empuja el botón hacia la derecha -->
  <span class="spacer"></span>

  <button mat-raised-button (click)="openCreateDialog()">
    <mat-icon>add</mat-icon>
    Nueva Tarea
  </button>
</mat-toolbar>

<!-- CONTENIDO PRINCIPAL -->
<div class="container">

  <!-- TABLA de Angular Material -->
  <table mat-table [dataSource]="tasks" class="mat-elevation-z4">

    <!-- Columna: ID -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let task">{{ task.id }}</td>
    </ng-container>

    <!-- Columna: Título -->
    <ng-container matColumnDef="titulo">
      <th mat-header-cell *matHeaderCellDef>Título</th>
      <td mat-cell *matCellDef="let task">{{ task.titulo }}</td>
    </ng-container>

    <!-- Columna: Descripción -->
    <ng-container matColumnDef="descripcion">
      <th mat-header-cell *matHeaderCellDef>Descripción</th>
      <td mat-cell *matCellDef="let task">{{ task.descripcion }}</td>
    </ng-container>

    <!-- Columna: Estado (con chips de colores) -->
    <ng-container matColumnDef="estado">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let task">
        <mat-chip [class]="'chip-' + task.estado.replace(' ', '-')">
          {{ task.estado }}
        </mat-chip>
      </td>
    </ng-container>

    <!-- Columna: Fecha de creación -->
    <ng-container matColumnDef="fecha_creacion">
      <th mat-header-cell *matHeaderCellDef>Fecha</th>
      <td mat-cell *matCellDef="let task">
        {{ task.fecha_creacion | date:'dd/MM/yyyy HH:mm' }}
      </td>
    </ng-container>

    <!-- Columna: Acciones (botones editar y eliminar) -->
    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let task">
        <button mat-icon-button color="primary" (click)="openEditDialog(task)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deleteTask(task.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <!-- Fila de encabezados -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <!-- Filas de datos -->
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

  <!-- Mensaje cuando no hay tareas -->
  @if (tasks.length === 0) {
    <p class="no-tasks">No hay tareas registradas. ¡Crea una nueva!</p>
  }

</div>
